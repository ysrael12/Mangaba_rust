name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Gerar documentação
        run: cargo doc --no-deps
        working-directory: ./Developer_documentation/mangaba

      - name: Criar index.html de redirect
        run: |
          CRATE=$(cd ./Developer_documentation/mangaba && cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['name'].replace('-','_'))")
          echo "Crate detectado: $CRATE"
          echo "<meta http-equiv=\"refresh\" content=\"0; url=${CRATE}/index.html\">" \
            > ./Developer_documentation/mangaba/target/doc/index.html

      - name: Corrigir permissões
        run: chmod -R +rX ./Developer_documentation/mangaba/target/doc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Developer_documentation/mangaba/target/doc

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
